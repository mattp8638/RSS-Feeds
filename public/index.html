<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enterprise Threat Intelligence Feed Aggregator">
    <title>Threat Feed Aggregator</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
                <h1 class="app-title">Threat Intel</h1>
            </div>
            
            <nav class="nav-menu">
                <a href="/" class="nav-item" data-page="all">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"/>
                        <rect x="14" y="3" width="7" height="7"/>
                        <rect x="14" y="14" width="7" height="7"/>
                        <rect x="3" y="14" width="7" height="7"/>
                    </svg>
                    <span>All Feeds</span>
                </a>
                <a href="/advisories" class="nav-item" data-page="advisories">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    <span>Advisories</span>
                </a>
                <a href="/indicators" class="nav-item" data-page="iocs">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                    <span>Indicators</span>
                </a>
                <a href="/research" class="nav-item" data-page="research">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
                    </svg>
                    <span>Research</span>
                </a>
                <a href="/settings" class="nav-item" data-page="settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M12 1v6m0 6v6m-7.07-7.07l4.24 4.24m2.83-2.83l4.24 4.24m-14.31 0l4.24-4.24m2.83 2.83l4.24-4.24"/>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span class="status-text">Live</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="search-container">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" class="search-input" placeholder="Search threats, CVEs, IOCs...">
                    <button id="searchBtn" class="btn-icon" title="Search">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 11 12 14 22 4"/>
                            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                        </svg>
                    </button>
                </div>

                <div class="header-actions">
                    <button id="refreshBtn" class="btn-icon" title="Refresh feeds">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"/>
                            <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
                        </svg>
                    </button>
                    <button id="filterBtn" class="btn-icon" title="Filter">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="filter-panel" id="filterPanel" style="display: none;">
                <div class="filter-group">
                    <label class="filter-label">Time Range</label>
                    <select id="daysFilter" class="filter-select">
                        <option value="1">Last 24 hours</option>
                        <option value="7">Last 7 days</option>
                        <option value="30" selected>Last 30 days</option>
                        <option value="90">Last 90 days</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-label">
                        <input type="checkbox" id="fuzzySearch" class="filter-checkbox">
                        Fuzzy search
                    </label>
                </div>
            </div>

            <div id="contentArea" class="content-area">
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>Loading threat intelligence...</p>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
